<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="manifest" href="./manifest.json">
    <title>EverGreen Login Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #edf5ef;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            padding: 40px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .title {
            text-align: center;
            font-size: 40px;
            font-weight: 700;
            color: #111;
            margin-bottom: 30px;
        }

        .tab-box {
            display: flex;
            background: #ececf0;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .active {
            background: #2f8732;
            color: #fff;
        }

        .inactive {
            background: transparent;
            color: #111;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 17px;
            font-weight: 500;
            color: #111;
        }

        /* পাসওয়ার্ড ফিল্ডের জন্য পজিশন ঠিক করা হয়েছে */
        .password-wrapper {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            padding-right: 50px; /* চোখের আইকনের জন্য ডানে জায়গা রাখা হয়েছে */
            border-radius: 10px;
            border: 1px solid #2f8732;
            background: #f9fbf9;
            font-size: 16px;
            outline: none;
        }

        /* চোখ বাটনটির পজিশন সুন্দর করা হয়েছে */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            color: #666;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #2f8732;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #256d28;
        }

        @media(max-width:500px) {
            .login-container {
                margin: 20px;
                padding: 30px 22px;
            }

            .title {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">
            <img src="logo.png" alt="EverGreen Logo">
        </div>

        <h1 class="title">Member Portal</h1>

        <div class="tab-box">
            <button id="memberTab" class="tab active" onclick="switchTab('member')">Member Login</button>
            <button id="adminTab" class="tab inactive" onclick="switchTab('admin')">Admin Login</button>
        </div>

        <div class="input-group">
            <label>User ID</label>
            <input type="text" id="userId" placeholder="ege0101">
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter Password">
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>
        </div>

        <button class="login-btn" onclick="login()">Login Now</button>

        <p style="text-align:center;margin-top:16px;font-size:14px;">
            <a href="#" onclick="openForgot()" style="color:#2f8732;font-weight:600;text-decoration:none;">🔑 Forgot Password?</a>
        </p>
    </div>

    <!-- ══════════ FORGOT PASSWORD MODAL ══════════ -->
    <div id="forgotOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;display:none;justify-content:center;align-items:center;">
        <div style="background:#fff;border-radius:18px;padding:32px 28px;width:100%;max-width:400px;margin:20px;box-shadow:0 12px 40px rgba(0,0,0,0.18);">
            <h2 style="font-size:22px;font-weight:700;color:#111;margin-bottom:6px;text-align:center;">🔑 পাসওয়ার্ড খুঁজুন</h2>
            <p style="font-size:13px;color:#666;text-align:center;margin-bottom:22px;">Member ID ও রেজিস্টার্ড ফোন নম্বর দিন</p>

            <div style="margin-bottom:16px;">
                <label style="font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:6px;">Member ID</label>
                <input id="fUserId" type="text" placeholder="যেমন: ege0101"
                    style="width:100%;padding:13px 15px;border:1px solid #2f8732;border-radius:10px;font-size:15px;outline:none;background:#f9fbf9;">
            </div>

            <div style="margin-bottom:20px;">
                <label style="font-size:14px;font-weight:600;color:#333;display:block;margin-bottom:6px;">রেজিস্টার্ড ফোন নম্বর</label>
                <input id="fPhone" type="tel" placeholder="01XXXXXXXXX"
                    style="width:100%;padding:13px 15px;border:1px solid #2f8732;border-radius:10px;font-size:15px;outline:none;background:#f9fbf9;">
            </div>

            <div id="forgotResult" style="display:none;background:#f0faf2;border:1px solid #b2dbb9;border-radius:10px;padding:14px 16px;margin-bottom:18px;text-align:center;">
                <p style="font-size:13px;color:#555;margin-bottom:4px;">আপনার পাসওয়ার্ড:</p>
                <p id="forgotPass" style="font-size:22px;font-weight:700;color:#0b6623;letter-spacing:2px;"></p>
            </div>

            <div id="forgotError" style="display:none;background:#fff0f0;border:1px solid #ffcccc;color:#cc0000;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;text-align:center;"></div>

            <button onclick="checkForgot()"
                style="width:100%;padding:14px;background:#2f8732;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;"
                id="forgotBtn">খুঁজুন</button>

            <button onclick="closeForgot()"
                style="width:100%;padding:12px;background:#f0f0f0;color:#555;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;">বাতিল</button>
        </div>
    </div>

    <script>
        let loginType = "member";

        /* =========================
        SWITCH TAB
        ========================= */
        function switchTab(type) {
            loginType = type;
            if (type === "member") {
                document.getElementById("memberTab").classList.add("active");
                document.getElementById("memberTab").classList.remove("inactive");
                document.getElementById("adminTab").classList.add("inactive");
                document.getElementById("adminTab").classList.remove("active");
            } else {
                document.getElementById("adminTab").classList.add("active");
                document.getElementById("adminTab").classList.remove("inactive");
                document.getElementById("memberTab").classList.add("inactive");
                document.getElementById("memberTab").classList.remove("active");
            }
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbyva2SinAyCPj76zYzUQNc05PItsQ6nKVRoZvbS15qGyRWlsmaa6WrTOKTy6xaj50tS/exec";

        /* =========================
        LOGIN FUNCTION
        ========================= */
        async function login() {
            const userId = document.getElementById("userId").value.trim().toLowerCase();
            const password = document.getElementById("password").value.trim();
            const btn = document.querySelector(".login-btn");

            if (!userId || !password) {
                showError("User ID এবং Password দিন।");
                return;
            }

            // Loading state
            btn.textContent = "⏳ Checking...";
            btn.disabled = true;

            /* =========================
            ADMIN LOGIN — Google Sheet থেকে verify
            ========================= */
            if (loginType === "admin") {
                try {
                    const res = await fetch(`${API_URL}?action=adminLogin&userId=${encodeURIComponent(userId)}&password=${encodeURIComponent(password)}`);
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem("adminLoggedIn", "true");
                        localStorage.setItem("adminId", userId);
                        window.location.href = "admin.html";
                    } else {
                        showError("Admin ID বা Password ভুল!");
                    }
                } catch(e) {
                    showError("সার্ভার সংযোগে সমস্যা হয়েছে!");
                }
                btn.textContent = "Login Now";
                btn.disabled = false;
                return;
            }

            /* =========================
            MEMBER LOGIN — Google Sheet থেকে verify
            ========================= */
            if (loginType === "member") {
                try {
                    const res = await fetch(`${API_URL}?action=memberLogin&userId=${encodeURIComponent(userId)}&password=${encodeURIComponent(password)}`);
                    const data = await res.json();
                    if (data.success) {
                        localStorage.setItem("memberLoggedIn", "true");
                        localStorage.setItem("memberId", userId);
                        window.location.href = "member-dashboard.html";
                    } else {
                        showError("Member ID বা Password ভুল!");
                    }
                } catch(e) {
                    showError("সার্ভার সংযোগে সমস্যা হয়েছে!");
                }
                btn.textContent = "Login Now";
                btn.disabled = false;
            }
        }

        function showError(msg) {
            let err = document.getElementById("errorMsg");
            if (!err) {
                err = document.createElement("div");
                err.id = "errorMsg";
                err.style.cssText = "background:#fff0f0;border:1px solid #ffcccc;color:#cc0000;padding:12px 16px;border-radius:10px;margin-top:16px;font-size:14px;font-weight:500;text-align:center;";
                document.querySelector(".login-btn").after(err);
            }
            err.textContent = "⚠️ " + msg;
            err.style.display = "block";
            setTimeout(() => { err.style.display = "none"; }, 4000);
        }

        /* =========================
        TOGGLE PASSWORD VIEW
        ========================= */
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈'; // পাসওয়ার্ড দেখা গেলে আইকন পরিবর্তন হবে
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️'; // পাসওয়ার্ড লুকিয়ে রাখলে আবার চোখ দেখাবে
            }
        }
        /* =========================
        FORGOT PASSWORD
        ========================= */
        function openForgot() {
            document.getElementById('fUserId').value = '';
            document.getElementById('fPhone').value = '';
            document.getElementById('forgotResult').style.display = 'none';
            document.getElementById('forgotError').style.display = 'none';
            document.getElementById('forgotPass').textContent = '';
            document.getElementById('forgotOverlay').style.display = 'flex';
        }

        function closeForgot() {
            document.getElementById('forgotOverlay').style.display = 'none';
        }

        async function checkForgot() {
            const userId = document.getElementById('fUserId').value.trim().toLowerCase();
            const phone  = document.getElementById('fPhone').value.trim();
            const btn    = document.getElementById('forgotBtn');
            const errEl  = document.getElementById('forgotError');
            const resEl  = document.getElementById('forgotResult');

            errEl.style.display = 'none';
            resEl.style.display = 'none';

            if (!userId || !phone) {
                errEl.textContent = '⚠️ Member ID এবং ফোন নম্বর দুটোই দিন।';
                errEl.style.display = 'block';
                return;
            }

            btn.textContent = '⏳ যাচাই হচ্ছে...';
            btn.disabled = true;

            try {
                const res  = await fetch(`${API_URL}?action=forgotPassword&userId=${encodeURIComponent(userId)}&phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if (data.success) {
                    document.getElementById('forgotPass').textContent = data.password;
                    resEl.style.display = 'block';
                } else {
                    errEl.textContent = '❌ Member ID বা ফোন নম্বর মেলেনি।';
                    errEl.style.display = 'block';
                }
            } catch(e) {
                errEl.textContent = '❌ সার্ভার সংযোগে সমস্যা হয়েছে।';
                errEl.style.display = 'block';
            }

            btn.textContent = 'খুঁজুন';
            btn.disabled = false;
        }

        // Overlay এর বাইরে ক্লিক করলে বন্ধ হবে
        document.getElementById('forgotOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeForgot();
        });
    </script>
</body>

</html>
