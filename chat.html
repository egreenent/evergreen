<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen Cooperative | Community Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #064e3b; /* Evergreen Dark */
            --accent: #10b981;  /* Emerald */
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #f0fdf4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
            height: 100vh;
            display: flex;
        }

        /* Glassmorphism Sidebar */
        nav {
            width: 280px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        /* Unique Chat Card Design (Not WhatsApp style) */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .chat-input {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <nav>
        <h2>Evergreen Co-op</h2>
        <div id="user-profile" class="glass-card" style="margin-top:20px">
            </div>
        <ul style="list-style: none; margin-top: 30px;">
            <li>Community Feed</li>
            <li>Live Rooms</li>
            <li>Notice Board</li>
        </ul>
    </nav>

    <main class="main-chat">
        <div class="glass-card" style="flex:1; overflow-y: auto;" id="message-container">
            </div>
        <input type="text" class="chat-input" placeholder="Type a message to the society...">
    </main>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);

        // Core logic: Realtime Chat Listener
        const db = firebase.database();
        const chatRef = db.ref('messages');

        function sendMessage(text) {
            chatRef.push({
                text: text,
                sender: firebase.auth().currentUser.displayName,
                timestamp: Date.now()
            });
        }

        // Initialize App
        console.log("Evergreen Platform Initialized");
    </script>
</body>
</html>
