<!DOCTYPE html>
<html>

<head>
<script>

if(localStorage.getItem("adminLoggedIn") !== "true"){
window.location.href = "login.html";
}

</script>
  
<title>Admin Dashboard</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eef3ef;
padding:20px;
}

.header{
background:#0b5d2a;
padding:20px;
border-radius:15px;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
}

.dashboard-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
border-left:6px solid #0b5d2a;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card h2{
font-size:18px;
color:#555;
margin-bottom:10px;
}

.card h1{
font-size:36px;
color:#0b5d2a;
}

.section{
background:#fff;
padding:25px;
border-radius:15px;
margin-bottom:30px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
}

.section h2{
margin-bottom:20px;
color:#0b5d2a;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:15px;
font-size:15px;
}

button{
padding:14px 25px;
background:#0b5d2a;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:600;
}

button:hover{
background:#094821;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#0b5d2a;
color:#fff;
padding:14px;
text-align:left;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
}

.download-btn{
background:#c99a2e;
padding:10px 16px;
border-radius:8px;
color:#fff;
text-decoration:none;
display:inline-block;
}

.download-btn:hover{
background:#af8427;
}

@media(max-width:768px){

.header{
flex-direction:column;
gap:15px;
text-align:center;
}

table{
font-size:13px;
}

}

  .logout-btn{

background:#d62828;
color:#fff;
border:none;
padding:12px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:600;

}

.logout-btn:hover{

background:#b71c1c;

}
</style>

</head>

<body>

<div class="header">

<h1>EverGreen Admin Dashboard</h1>

<button onclick="loadDashboard()">
Refresh Data
</button>

<button onclick="adminLogout()"
class="logout-btn">
Logout
</button>
  
</div>

<!-- Dashboard Cards -->

<div class="dashboard-cards">

<div class="card">

<h2>Total Members</h2>

<h1 id="totalMembers">0</h1>

</div>

<div class="card">

<h2>Total Collection</h2>

<h1 id="totalCollection">0</h1>

</div>

<div class="card">

<h2>Total Payments</h2>

<h1 id="totalPayments">0</h1>

</div>

<div class="card">

<h2>Active Members</h2>

<h1 id="activeMembers">0</h1>

</div>

</div>

<!-- Search Member -->

<div class="section">

<h2>Search Member</h2>

<input type="text"
id="searchMemberId"
placeholder="Enter Member ID">

<button onclick="searchMember()">
Search
</button>

<div id="memberResult"></div>

</div>

<!-- Payment History -->

<div class="section">

<h2>Recent Payments</h2>

<table>

<thead>

<tr>

<th>Receipt No</th>
<th>Member ID</th>
<th>Name</th>
<th>Amount</th>
<th>Receipt</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxwksTf-ZgPHpA1ubCXZM2QFIuHuNyWpiwH2y7lTHYPV9Cvp6pv7oIlwuqwuOigJFTw/exec";

async function loadDashboard(){

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"dashboard"

})

});

const result =
await response.json();

document.getElementById(
"totalMembers"
).innerText =
result.totalMembers;

document.getElementById(
"totalCollection"
).innerText =
result.totalCollection;

document.getElementById(
"totalPayments"
).innerText =
result.totalPayments;

document.getElementById(
"activeMembers"
).innerText =
result.activeMembers;

let rows = "";

result.payments.forEach(payment=>{

rows += `

<tr>

<td>${payment.receipt}</td>

<td>${payment.memberId}</td>

<td>${payment.name}</td>

<td>${payment.amount}</td>

<td>

<a href="${payment.url}"
target="_blank"
class="download-btn">

Download

</a>

</td>

</tr>

`;

});

document.getElementById(
"paymentTable"
).innerHTML = rows;

}

async function searchMember(){

const memberId =
document.getElementById(
"searchMemberId"
).value;

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"searchMember",

memberId:memberId

})

});

const result =
await response.json();

document.getElementById(
"memberResult"
).innerHTML = `

<h3>${result.name}</h3>

<p>
Phone:
${result.phone}
</p>

<p>
Email:
${result.email}
</p>

<p>
Status:
${result.status}
</p>

<br>

<a href="${result.pdf}"
target="_blank"
class="download-btn">

Membership PDF

</a>

<a href="${result.idcard}"
target="_blank"
class="download-btn">

ID Card

</a>

`;

}

loadDashboard();

  function adminLogout(){

localStorage.removeItem(
"adminLoggedIn"
);

localStorage.removeItem(
"adminId"
);

window.location.href =
"login.html";

}
</script>

</body>

</html>
