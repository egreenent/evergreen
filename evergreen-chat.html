<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,push,onValue,set,onDisconnect,serverTimestamp,get,query,orderByChild,limitToLast}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{getStorage,ref as sr,uploadBytes,getDownloadURL}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const FC={
  apiKey:"AIzaSyAW0gcp3PUr3jRb3ZpS9j7IzT2gLb3U1qw",
  authDomain:"evergreen-db-9323c.firebaseapp.com",
  projectId:"evergreen-db-9323c",
  storageBucket:"evergreen-db-9323c.firebasestorage.app",
  messagingSenderId:"820228868303",
  appId:"1:820228868303:web:fd799a57051587a7af0fba",
  databaseURL:"https://evergreen-db-9323c-default-rtdb.firebaseio.com"
};
const GS="https://script.google.com/macros/s/AKfycbyva2SinAyCPj76zYzUQNc05PItsQ6nKVRoZvbS15qGyRWlsmaa6WrTOKTy6xaj50tS/exec";

const fapp=initializeApp(FC);
const db=getDatabase(fapp);
const st=getStorage(fapp);

let me=null,allM=[],pmId=null,pmUnsub=null,tyTimer=null;
const fill=document.getElementById('ldFill');
const setLD=p=>fill.style.width=p+'%';

// ... (আগের সব ফাংশন যেমন আছে তেমনই রাখা হয়েছে) ...

// ── GROUP CHAT ──
let cachedGroupMsgs=[];
function listenGroup(){
  const q2=query(ref(db,'groupChat'),orderByChild('ts'),limitToLast(100));
  onValue(q2,snap=>{
    cachedGroupMsgs=[];
    snap.forEach(ch=>cachedGroupMsgs.push({id:ch.key,...ch.val()}));
    renderGroup(cachedGroupMsgs);
  },(err)=>{
    console.error('DB listen error:',err);
    toast('❌ Database: '+err.message);
  });
  // typing listener...
  onValue(ref(db,'typing'),snap=>{
    const d=snap.val()||{};
    const ty=Object.entries(d).filter(([id,v])=>id!==me?.memberId&&v?.typing).map(([,v])=>v.name?.split(' ')[0]);
    const tr=document.getElementById('typingRow');
    document.getElementById('typingLbl').textContent=(ty.join(', ')||'')+'  টাইপ করছেন...';
    tr.classList.toggle('show',ty.length>0);
  });
}

function renderGroup(msgs){
  const c=document.getElementById('groupMsgs');
  if(!c) return;
  let html='<div class="sys-msg">EverGreen Group Chat 🌿</div>';
  let lastD='';
  msgs.forEach(m=>{
    const d=new Date(m.ts||Date.now());
    const ds=d.toLocaleDateString('bn-BD',{year:'numeric',month:'long',day:'numeric'});
    if(ds!==lastD){html+=`<div class="date-pill"><span>${ds}</span></div>`;lastD=ds}
    const isMe=m.senderId===me?.memberId;
    const t=d.toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});
    const ini=(m.senderName||'?')[0].toUpperCase();
    const bg=aColor(m.senderId);
    const avEl=safeAvatar(m.senderPhoto,ini,bg,'34px','14px','msg-av');
    if(m.type==='image'){
      html+=`<div class="msg-wrap ${isMe?'me':'them'}">
        ${!isMe?avEl:''}
        <div class="msg-col">
          ${!isMe?`<div class="msg-name">${esc(m.senderName)}</div>`:''}
          <div class="msg-img-bubble"><img src="${m.url}" onclick="openIV('${m.url}')" loading="lazy"></div>
          <div class="bubble-foot"><span class="bubble-time">${t}</span>${isMe?'<span class="bubble-tick">✓✓</span>':''}</div>
        </div></div>`;
    }else{
      html+=`<div class="msg-wrap ${isMe?'me':'them'}">
        ${!isMe?avEl:''}
        <div class="msg-col">
          ${!isMe?`<div class="msg-name">${esc(m.senderName)}</div>`:''}
          <div class="bubble"><div class="bubble-text">${esc(m.text||'')}</div>
          <div class="bubble-foot"><span class="bubble-time">${t}</span>${isMe?'<span class="bubble-tick">✓✓</span>':''}</div></div>
        </div></div>`;
    }
  });
  c.innerHTML=html;
  setTimeout(()=>{ c.scrollTop=c.scrollHeight; },80);
}

// **ফিক্সড sendGroup**
window.sendGroup=async function(){
  const inp=document.getElementById('msgIn');
  const txt=inp.value.trim();
  if(!txt){toast('❌ মেসেজ খালি');return;}
  if(!me){toast('❌ লগইন করুন');return;}

  const tempTxt=txt;
  inp.value='';resize(inp);clearTyping();

  try{
    const newMsg = {
      text:tempTxt,
      senderId:me.memberId,
      senderName:me.name,
      senderPhoto:me.photo||'',
      ts:Date.now(),
      type:'text'
    };

    await push(ref(db,'groupChat'), newMsg);

    // তাৎক্ষণিকভাবে নিজের চ্যাটে দেখানো
    cachedGroupMsgs.push(newMsg);
    renderGroup(cachedGroupMsgs);

    set(ref(db,'lastMsg'),{sender:me.name,text:tempTxt.substring(0,60),ts:Date.now(),senderId:me.memberId});
  }catch(err){
    console.error('Send error:',err);
    toast('❌ '+err.message);
    inp.value=tempTxt;
  }
};

window.sendImg=async function(inp){
  const file=inp.files[0];if(!file||!me)return;
  toast('📤 ছবি আপলোড হচ্ছে...');
  try{
    const ir=sr(st,`chat/${me.memberId}_${Date.now()}`);
    await uploadBytes(ir,file);
    const url=await getDownloadURL(ir);
    const newMsg = {type:'image',url,senderId:me.memberId,senderName:me.name,senderPhoto:me.photo||'',ts:Date.now()};
    await push(ref(db,'groupChat'),newMsg);
    cachedGroupMsgs.push(newMsg);
    renderGroup(cachedGroupMsgs);
    toast('✅ ছবি পাঠানো হয়েছে');
  }catch{toast('❌ ছবি পাঠাতে সমস্যা')}
  inp.value='';
};

// **ফিক্সড sendPm**
window.sendPm=async function(){
  const inp=document.getElementById('pmIn');
  const txt=inp.value.trim();
  if(!txt||!me||!pmId)return;

  const tempTxt=txt;
  inp.value='';resize(inp);

  try{
    const ck=[me.memberId,pmId].sort().join('_');
    const newMsg = {
      text:tempTxt,
      senderId:me.memberId,
      senderName:me.name,
      ts:Date.now()
    };

    await push(ref(db,`pm/${ck}`), newMsg);

    // তাৎক্ষণিকভাবে নিজের চ্যাটে দেখানো
    const c = document.getElementById('pmMsgs');
    if(c){
      const t = new Date().toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});
      const htmlToAdd = `
        <div class="msg-wrap me">
          <div class="msg-col">
            <div class="bubble">
              <div class="bubble-text">${esc(tempTxt)}</div>
              <div class="bubble-foot">
                <span class="bubble-time">${t}</span>
                <span class="bubble-tick">✓✓</span>
              </div>
            </div>
          </div>
        </div>`;
      c.insertAdjacentHTML('beforeend', htmlToAdd);
      c.scrollTop = c.scrollHeight;
    }
  }catch(err){
    console.error('PM send error:',err);
    toast('❌ '+err.message);
  }
};

// বাকি সব ফাংশন (renderPm, openPm, ইত্যাদি) অপরিবর্তিত রাখা হয়েছে...

// ── HELPERS ──
window.resize=function(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'};
window.openIV=function(u){document.getElementById('ivImg').src=u;document.getElementById('imgViewer').classList.add('open')};
window.closeIV=function(){document.getElementById('imgViewer').classList.remove('open')};

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function aColor(id){
  const c=['#0b5d2a','#1565c0','#6a1b9a','#c62828','#00695c','#e65100','#37474f','#ad1457','#4527a0','#00838f'];
  let h=0;for(const ch of(id||''))h+=ch.charCodeAt(0);return c[h%c.length];
}
</script>
