
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EverGreen Payment Receipt</title>

<style>

body{

margin:0;
padding:30px;
font-family:Arial, sans-serif;
background:#eef5ef;

}

.receipt{

max-width:700px;
margin:auto;
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}

.top{

text-align:center;
border-bottom:2px solid #0b5d2a;
padding-bottom:20px;
margin-bottom:30px;

}

.logo{

width:120px;
margin-bottom:10px;

}

h1{

margin:0;
color:#0b5d2a;
font-size:36px;

}

.subtitle{

color:#555;
margin-top:8px;

}

.row{

display:flex;
justify-content:space-between;
margin:18px 0;
padding:15px;
background:#f7f7f7;
border-radius:10px;

}

.label{

font-weight:bold;
color:#0b5d2a;

}

.value{

font-weight:bold;
color:#222;

}

.status{

text-align:center;
margin-top:30px;
font-size:28px;
font-weight:bold;
color:green;

}

.print-btn{

width:100%;
padding:16px;
border:none;
background:#0b5d2a;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:30px;

}

.print-btn:hover{
background:#09481f;
}

@media print{

.print-btn{
display:none;
}

body{
background:white;
}

}

</style>

</head>
<body>

<div class="receipt">

<div class="top">

<img src="logo.png" class="logo">

<h1>EverGreen Enterprise</h1>

<p class="subtitle">
Digital Payment Receipt
</p>

</div>

<div class="row">
<span class="label">Receipt No</span>
<span class="value" id="receiptNo"></span>
</div>

<div class="row">
<span class="label">Member ID</span>
<span class="value" id="memberId"></span>
</div>

<div class="row">
<span class="label">Member Name</span>
<span class="value" id="name"></span>
</div>

<div class="row">
<span class="label">Month</span>
<span class="value" id="month"></span>
</div>

<div class="row">
<span class="label">Amount</span>
<span class="value" id="amount"></span>
</div>

<div class="row">
<span class="label">Payment Date</span>
<span class="value" id="date"></span>
</div>

<div class="status">
PAID
</div>

<button class="print-btn"
onclick="window.print()">
Print Receipt
</button>

</div>

<script>

<script>

const params =
new URLSearchParams(window.location.search);

const memberId =
params.get("memberId");

const name =
params.get("name");

const month =
params.get("month");

const amount =
params.get("amount");

document.getElementById("memberId")
.innerText = memberId;

document.getElementById("name")
.innerText = name;

document.getElementById("month")
.innerText = month;

document.getElementById("amount")
.innerText = amount + " BDT";

</script></script>

</body>
</html>
