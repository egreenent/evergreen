<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="manifest"
href="manifest.json">

<title>EverGreen Payment Entry</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#eef3ef;
padding:30px;

}

.container{

max-width:700px;
margin:auto;
background:#fff;
padding:35px;
border-radius:18px;
border:3px solid #0b5d2a;
box-shadow:0 5px 20px rgba(0,0,0,0.1);

}

h1{

text-align:center;
color:#0b5d2a;
margin-bottom:30px;
font-size:34px;

}

input{

width:100%;
padding:15px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;

}

button{

width:100%;
padding:16px;
background:#0b5d2a;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#094821;
transform:translateY(-2px);

}

#loader{

display:none;
text-align:center;
margin-top:20px;
font-size:18px;
color:#0b5d2a;

}

@media(max-width:768px){

.container{

padding:22px;

}

h1{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>Monthly Payment Entry</h1>

<input
type="text"
id="memberId"
placeholder="Member ID">

<input
type="text"
id="name"
placeholder="Member Name">

<input
type="text"
id="month"
placeholder="Month">

<input
type="number"
id="amount"
placeholder="Amount">

<input
type="number"
id="fine"
placeholder="Fine Amount">

<button onclick="generateReceipt()">

Generate Receipt

</button>

<div id="loader">

Processing Payment...

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxwksTf-ZgPHpA1ubCXZM2QFIuHuNyWpiwH2y7lTHYPV9Cvp6pv7oIlwuqwuOigJFTw/exec";

async function generateReceipt(){

try{

const memberId =
document.getElementById("memberId").value.trim();

const name =
document.getElementById("name").value.trim();

const month =
document.getElementById("month").value.trim();

const amount =
document.getElementById("amount").value.trim();

const fine =
document.getElementById("fine").value.trim();

if(
memberId === "" ||
name === "" ||
month === "" ||
amount === ""
){

alert("Please Fill All Fields");

return;

}

document.getElementById("loader")
.style.display = "block";

const data = {

action:"payment",
memberId:memberId,
name:name,
month:month,
amount:amount,
fine:fine

};

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify(data)

});

const result =
await response.json();

document.getElementById("loader")
.style.display = "none";

console.log(result);

if(result.status === "success"){

alert("✅ Payment Saved Successfully");

const receiptLink =

`https://egreenent.netlify.app/receipt.html?memberId=${encodeURIComponent(memberId)}&name=${encodeURIComponent(name)}&month=${encodeURIComponent(month)}&amount=${encodeURIComponent(amount)}&fine=${encodeURIComponent(fine)}`;

window.location.href =
receiptLink;

}else{

alert("❌ Payment Failed");

}

}catch(error){

console.log(error);

document.getElementById("loader")
.style.display = "none";

alert("Server Error");

}

}

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'service-worker.js'
);

}

</script>

</body>

</html>
