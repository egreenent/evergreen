<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #002B49; /* McKinsey Deep Blue */
      --accent: #007DA3;
      --bg: #F0F4F7;
    }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { color: var(--primary); text-align: center; margin-bottom: 30px; font-weight: 600; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; color: #444; margin-bottom: 8px; font-weight: 400; }
    input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(0,125,163,0.2); }
    button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    button:hover { background: var(--accent); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #status { margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; }
    .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }



   @keyframes flash{
  0%{transform:scale(1);}
  50%{transform:scale(1.03);}
  100%{transform:scale(1);}
}
  </style>
</head>
<body>

<div class="card">
  <h2>EGE Portal</h2>
  <form id="uploadForm">
    <div class="form-group">
      <label>ইউজার আইডি সিলেক্ট করুন</label>
      <select name="userId" id="userId" required>
        <option value="">আইডি বেছে নিন</option>
        <script>
          const select = document.getElementById('userId');
          for(let i=101; i<=120; i++) {
            let id = "ege0" + i;
            let opt = document.createElement('option');
            opt.value = id;
            opt.innerHTML = id;
            select.appendChild(opt);
          }
        </script>
      </select>
    </div>

    <div class="form-group">
      <label>ইউজার এর নাম</label>
      <input type="text" name="userName" placeholder="পুরো নাম লিখুন" required>
    </div>

    <div class="form-group">
      <label>আপনার ছবি (Image)</label>
      <input type="file" name="imageFile" accept="image/*" required>
    </div>

    <div class="form-group">
      <label>আপনার স্বাক্ষর (Signature)</label>
      <input type="file" name="sigFile" accept="image/*" required>
    </div>

    <div class="form-group">
      <label>পিডিএফ ডকুমেন্ট (PDF)</label>
      <input type="file" name="pdfFile" accept="application/pdf" required>
    </div>

    <button type="submit" id="submitBtn">সাবমিট করুন</button>
  </form>
  
  <div class="loader" id="loader"></div>
  <div id="status"></div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyva2SinAyCPj76zYzUQNc05PItsQ6nKVRoZvbS15qGyRWlsmaa6WrTOKTy6xaj50tS/exec";

const form = document.getElementById('uploadForm');
const btn = document.getElementById('submitBtn');
const status = document.getElementById('status');
const loader = document.getElementById('loader');

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();

    reader.onload = () => {
      resolve(reader.result.split(',')[1]);
    };

    reader.onerror = error => reject(error);

    reader.readAsDataURL(file);
  });
}

form.addEventListener('submit', async function(e){

  e.preventDefault();

  btn.disabled = true;
  loader.style.display = "block";

  status.innerHTML = `
    <div style="
      background:#fff3cd;
      color:#856404;
      padding:15px;
      border-radius:8px;
      font-size:18px;
      font-weight:bold;
      border:1px solid #ffeeba;">
      ⏳ ফাইল আপলোড হচ্ছে...
    </div>
  `;

  try{

    const memberId =
      document.getElementById("userId").value;

    const photoFile =
      document.querySelector('input[name="imageFile"]').files[0];

    const signatureFile =
      document.querySelector('input[name="sigFile"]').files[0];

    const pdfFile =
      document.querySelector('input[name="pdfFile"]').files[0];

    const photoBase64 =
      await fileToBase64(photoFile);

    const signatureBase64 =
      await fileToBase64(signatureFile);

    const pdfBase64 =
      await fileToBase64(pdfFile);

    const response = await fetch(
      SCRIPT_URL + "?action=uploadDocuments",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({

          action:"uploadDocuments",

          memberId:memberId,

          photo:{
            name:photoFile.name,
            type:photoFile.type,
            data:photoBase64
          },

          signature:{
            name:signatureFile.name,
            type:signatureFile.type,
            data:signatureBase64
          },

          pdf:{
            name:pdfFile.name,
            type:"application/pdf",
            data:pdfBase64
          }

        })
      }
    );

    const result = await response.json();

    loader.style.display = "none";
    btn.disabled = false;

    if(result.success){

      status.innerHTML = `
      <div style="
        background:#d4edda;
        color:#155724;
        padding:20px;
        border-radius:10px;
        border:2px solid #28a745;
        font-size:22px;
        font-weight:bold;
        text-align:center;
        animation:flash 1s infinite;">
        ✅ Upload Successful
        <br><br>
        Member ID: ${memberId}
      </div>`;

      form.reset();

      console.log(result);

    }else{

      status.innerHTML = `
      <div style="
        background:#f8d7da;
        color:#721c24;
        padding:20px;
        border-radius:10px;
        border:2px solid red;
        font-size:20px;
        font-weight:bold;
        text-align:center;">
        ❌ Upload Failed
        <br><br>
        ${result.error || 'Unknown Error'}
      </div>`;
    }

  }catch(error){

    loader.style.display = "none";
    btn.disabled = false;

    status.innerHTML = `
    <div style="
      background:#f8d7da;
      color:#721c24;
      padding:20px;
      border-radius:10px;
      border:2px solid red;
      font-size:20px;
      font-weight:bold;
      text-align:center;">
      ❌ Server Error
      <br><br>
      ${error}
    </div>`;
  }

});

</script>

</body>
</html>
