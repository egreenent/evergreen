<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body{ background:#edf2ed; padding:20px; color:#0b5d2a; }
        .dashboard-header{ background:#0b6623; color:#fff; padding:25px; border-radius:25px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
        .member-id-box{ background:rgba(255,255,255,.18); padding:16px 28px; border-radius:14px; font-size:26px; font-weight:700; color:#fff; }
        .logout-btn{ background:#ff2a2a; color:#fff; border:none; padding:16px 28px; border-radius:14px; cursor:pointer; }
        .profile-card{ margin-top:25px; background:#fff; border-radius:25px; padding:35px; display:flex; align-items:center; gap:35px; box-shadow:0 10px 25px rgba(0,0,0,.08); }
        .profile-photo{ width:150px; height:150px; border-radius:50%; border:4px solid #d4a62b; }
        .profile-photo img{ width:100%; height:100%; border-radius:50%; object-fit:cover; }
        .stats-grid{ margin-top:25px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
        .stat-box{ background:#fff; padding:20px; border-radius:22px; box-shadow:0 10px 25px rgba(0,0,0,.08); }
        .section{ margin-top:25px; background:#fff; padding:30px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,.08); }
        table{ width:100%; border-collapse:collapse; margin-top:20px; }
        th{ background:#0b6623; color:#fff; padding:15px; text-align:left; }
        td{ padding:15px; border-bottom:1px solid #ddd; }
        .profile-btn { margin-top: 10px; display: inline-block; padding: 8px 15px; background: #0b6623; color: #fff; text-decoration: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="dashboard-header">
    <div class="dashboard-title"><h1>Member Dashboard</h1></div>
    <div class="header-right">
        <div class="member-id-box" id="memberIdText">ID: Loading...</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="profile-card">
    <div class="profile-photo"><img id="memberPhoto" src="https://via.placeholder.com/150" alt="Photo"></div>
    <div class="profile-info">
        <h1 id="memberName">Loading...</h1>
        <p id="memberPhone"></p>
        <p id="memberEmail"></p>
        <p id="addressText"></p>
        <p>Status: <span id="membershipStatus"></span></p>
        <a href="#" class="profile-btn" id="viewProfileBtn">View Full Profile</a>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-box"><h3>Total Payment</h3><h2 id="totalPayment">৳ 0</h2></div>
    <div class="stat-box"><h3>Total Receipts</h3><h2 id="totalReceipts">0</h2></div>
    <div class="stat-box"><h3>Due Amount</h3><h2 id="dueAmount">৳ 0</h2></div>
</div>

<div class="section">
    <h2>Payment History</h2>
    <table>
        <thead><tr><th>Month</th><th>Status</th><th>Amount</th><th>Total</th></tr></thead>
        <tbody id="paymentTableBody"></tbody>
    </table>
</div>

<div id="profilePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; overflow-y:auto;">
    <div style="background:#fff; width:500px; margin:50px auto; padding:30px; border-radius:15px; position:relative;">
        <span id="closePopup" style="position:absolute; top:10px; right:20px; font-size:30px; cursor:pointer;">&times;</span>
        <h2 style="text-align:center;">📋 Member Profile</h2>
        <div style="margin-top:20px;">
            <p><strong>Name:</strong> <span id="popupName"></span></p>
            <p><strong>Member ID:</strong> <span id="popupMemberId"></span></p>
            <p><strong>Phone:</strong> <span id="popupPhone"></span></p>
            <p><strong>Address:</strong> <span id="popupAddress"></span></p>
            <p><strong>Blood Group:</strong> <span id="popupBlood"></span></p>
            <p><strong>NID:</strong> <span id="popupNid"></span></p>
            <p><strong>Nominee:</strong> <span id="popupNominee"></span></p>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyva2SinAyCPj76zYzUQNc05PItsQ6nKVRoZvbS15qGyRWlsmaa6WrTOKTy6xaj50tS/exec";

window.onload = function() {
    const loggedInId = localStorage.getItem('memberId');
    if (!loggedInId) { window.location.href = "login.html"; return; }
    fetchMemberDashboardData(loggedInId);
};

async function fetchMemberDashboardData(memberId) {
    const response = await fetch(`${API_URL}?action=memberProfile&memberId=${memberId}`);
    const result = await response.json();
    if (result.success) {
        window.currentMemberData = result.profile; // এখানে ডাটা সেট করা হয়েছে
        const m = result.profile;
        document.getElementById("memberName").innerText = m.name;
        document.getElementById("memberPhone").innerText = "📞 " + m.phone;
        document.getElementById("memberEmail").innerText = "📧 " + m.email;
        document.getElementById("addressText").innerText = "📍 " + m.address;
        document.getElementById("memberPhoto").src = m.photo;
        document.getElementById("membershipStatus").innerText = m.status;
        document.getElementById("memberIdText").innerText = "ID: " + m.memberId;
        // পেমেন্ট ক্যালকুলেশন... (অন্যান্য ডাটা একইভাবে বসবে)
    }
}

document.getElementById("viewProfileBtn").addEventListener("click", function(e) {
    e.preventDefault();
    const m = window.currentMemberData;
    if(!m) { alert("Data loading..."); return; }
    document.getElementById("popupName").innerText = m.name;
    document.getElementById("popupMemberId").innerText = m.memberId;
    document.getElementById("popupPhone").innerText = m.phone;
    document.getElementById("popupAddress").innerText = m.address;
    document.getElementById("popupBlood").innerText = m.blood;
    document.getElementById("popupNid").innerText = m.nid;
    document.getElementById("popupNominee").innerText = m.nomineeName;
    document.getElementById("profilePopup").style.display = "block";
});

document.getElementById("closePopup").onclick = () => document.getElementById("profilePopup").style.display = "none";
function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
