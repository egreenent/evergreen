<!DOCTYPE html>
<html>

<head>
<script>

if(localStorage.getItem("memberLoggedIn") !== "true"){
window.location.href = "login.html";
}

</script>
<title>Member Dashboard</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#edf3ee;
padding:20px;
}

.header{

background:#0b5d2a;
padding:20px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
margin-bottom:25px;

}

.profile-card{

background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
display:flex;
gap:30px;
align-items:center;
margin-bottom:30px;

}

.profile-photo{

width:160px;
height:160px;
border-radius:50%;
overflow:hidden;
border:5px solid #d4af37;

}

.profile-photo img{

width:100%;
height:100%;
object-fit:cover;

}

.profile-info h1{
font-size:34px;
color:#0b5d2a;
}

.profile-info p{
margin-top:10px;
font-size:17px;
color:#555;
}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}

.stat-card{

background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);
border-left:6px solid #0b5d2a;

}

.stat-card h2{
font-size:18px;
color:#666;
margin-bottom:12px;
}

.stat-card h1{
font-size:34px;
color:#0b5d2a;
}

.section{

background:#fff;
padding:25px;
border-radius:15px;
margin-bottom:30px;
box-shadow:0 5px 15px rgba(0,0,0,0.06);

}

.section h2{
margin-bottom:20px;
color:#0b5d2a;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#0b5d2a;
color:#fff;
padding:14px;
text-align:left;
}

table td{
padding:14px;
border-bottom:1px solid #ddd;
}

.download-btn{

background:#c99a2e;
padding:10px 16px;
border-radius:8px;
color:#fff;
text-decoration:none;
display:inline-block;

}

.download-btn:hover{
background:#af8427;
}

@media(max-width:768px){

.profile-card{
flex-direction:column;
text-align:center;
}

.header{
flex-direction:column;
gap:15px;
text-align:center;
}

}

  .logout-btn{

background:#d62828;
color:#fff;
border:none;
padding:12px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:600;
}

  button{
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.logout-btn{
background:#d62828;
color:#fff;
border:none;
padding:12px 22px;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:600;
}

.logout-btn:hover{
background:#b71c1c;
}
</style>

</head>

<body>

<div class="header">

<h1>Member Dashboard</h1>

<h2 id="memberIdText">
Member ID
</h2>

<button onclick="memberLogout()"
class="logout-btn">
Logout
</button>
  
</div>

<!-- Profile -->

<div class="profile-card">

<div class="profile-photo">

<img id="memberPhoto"
src="">

</div>

<div class="profile-info">

<h1 id="memberName">
Loading...
</h1>

<p id="memberPhone"></p>

<p id="memberEmail"></p>

<p id="memberStatus"></p>

</div>

</div>

<!-- Stats -->

<div class="stats">

<div class="stat-card">

<h2>Total Payment</h2>

<h1 id="totalPayment">
0
</h1>

</div>

<div class="stat-card">

<h2>Total Receipts</h2>

<h1 id="totalReceipts">
0
</h1>

</div>

<div class="stat-card">

<h2>Membership Status</h2>

<h1 id="statusText">
Active
</h1>

</div>

</div>

<!-- Downloads -->

<div class="section">

<h2>Downloads</h2>

<a id="pdfLink"
href="#"
target="_blank"
class="download-btn">

Membership PDF

</a>

<a id="idCardLink"
href="#"
target="_blank"
class="download-btn">

ID Card

</a>

</div>

<!-- Payment History -->

<div class="section">

<h2>Payment History</h2>

<table>

<thead>

<tr>

<th>Receipt</th>
<th>Month</th>
<th>Amount</th>
<th>Date</th>
<th>Download</th>

</tr>

</thead>

<tbody id="paymentTable">

</tbody>

</table>

</div>

<input type="email"
id="email"
placeholder="Member Email">

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxwksTf-ZgPHpA1ubCXZM2QFIuHuNyWpiwH2y7lTHYPV9Cvp6pv7oIlwuqwuOigJFTw/exec";

const memberId =
localStorage.getItem("memberId");

async function loadMemberDashboard(){

const response =
await fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"memberDashboard",

memberId:memberId

})

});

const result =
await response.json();

document.getElementById(
"memberIdText"
).innerText =
result.memberId;

document.getElementById(
"memberName"
).innerText =
result.name;

document.getElementById(
"memberPhone"
).innerText =
"Phone: " + result.phone;

document.getElementById(
"memberEmail"
).innerText =
"Email: " + result.email;

document.getElementById(
"memberStatus"
).innerText =
"Status: " + result.status;

document.getElementById(
"memberPhoto"
).src =
result.photo;

document.getElementById(
"totalPayment"
).innerText =
result.totalAmount;

document.getElementById(
"totalReceipts"
).innerText =
result.totalReceipts;

document.getElementById(
"statusText"
).innerText =
result.status;

document.getElementById(
"pdfLink"
).href =
result.pdf;

document.getElementById(
"idCardLink"
).href =
result.idcard;

let rows = "";

result.payments.forEach(payment=>{

rows += `

<tr>

<td>${payment.receipt}</td>

<td>${payment.month}</td>

<td>${payment.amount}</td>

<td>${payment.date}</td>

<td>

<a href="${payment.url}"
target="_blank"
class="download-btn">

Receipt

</a>

</td>

</tr>

`;

});

document.getElementById(
"paymentTable"
).innerHTML = rows;

}

loadMemberDashboard();

+ receiptUrl

whatsapp:whatsappUrl
);


window.open(
result.whatsapp,
"_blank"
);

  function memberLogout(){

localStorage.removeItem(
"memberLoggedIn"
);

localStorage.removeItem(
"memberId"
);

window.location.href =
"login.html";
}

  if(result.status === "success"){

alert(
"Welcome To EverGreen Enterprise"
);

}
</script>

</body>

</html>
