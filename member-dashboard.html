<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    /* আপনার মূল সিএসএস অপরিবর্তিত রাখা হয়েছে */
    *{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
    body{background:#edf2ed; padding:20px; color:#0b5d2a;}
    .dashboard-header{background:#0b6623; color:#fff; padding:25px; border-radius:25px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; box-shadow:0 10px 25px rgba(0,0,0,.12);}
    .member-id-box{background:rgba(255,255,255,.18); padding:16px 28px; border-radius:14px; font-size:26px; font-weight:700; color:#fff;}
    .logout-btn{background:#ff2a2a; color:#fff; border:none; padding:16px 28px; border-radius:14px; font-size:18px; font-weight:700; cursor:pointer;}
    .profile-card{margin-top:25px; background:#fff; border-radius:25px; padding:35px; display:flex; align-items:center; gap:35px; box-shadow:0 10px 25px rgba(0,0,0,.08);}
    .profile-photo{width:180px; height:180px; border-radius:50%; overflow:hidden; border:6px solid #d4a62b; flex-shrink:0;}
    .profile-photo img{width:100%; height:100%; object-fit:cover;}
    .stats-grid{margin-top:25px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px;}
    .stat-box{background:#fff; padding:30px; border-radius:22px; box-shadow:0 10px 25px rgba(0,0,0,.08); border-left:6px solid #0b6623;}
    .section{margin-top:25px; background:#fff; padding:30px; border-radius:25px; box-shadow:0 10px 25px rgba(0,0,0,.08);}
</style>
</head>
<body>

<div class="dashboard-header">
    <div class="dashboard-title"><h1>Member Dashboard</h1></div>
    <div class="header-right">
        <div class="member-id-box" id="memberIdText">Member ID</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="profile-card">
    <div class="profile-photo"><img id="memberPhoto" src="https://via.placeholder.com/300x300.png" alt="Photo"></div>
    <div class="profile-info">
        <h1 id="memberName">Loading...</h1>
        <p id="memberPhone"></p>
        <p id="memberEmail"></p>
        <div class="member-status" id="memberStatus">Active Member</div>
        <div style="margin-top:10px;">
            <button id="viewProfileBtn" style="padding:8px 20px; background:#0b6623; color:#fff; border:none; border-radius:5px; cursor:pointer;">View Profile</button>
        </div>
    </div>
</div>

<div class="stats-grid">
    <div class="stat-box"><h3>Total Payment</h3><h2 id="totalPayment">৳ 0</h2></div>
    <div class="stat-box"><h3>Total Receipts</h3><h2 id="totalReceipts">0</h2></div>
    <div class="stat-box"><h3>Due Amount</h3><h2 id="dueAmount">৳ 0</h2></div>
</div>

<div id="profilePopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; overflow-y:auto; padding:20px;">
    <div style="background:#fff; width:100%; max-width:600px; margin:50px auto; padding:40px; border-radius:20px; position:relative; color:#333;">
        <span id="closePopup" style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer; color:#000;">&times;</span>
        <h2 style="text-align:center; margin-bottom:20px;">👤 Member Full Profile</h2>
        <div style="text-align:center; margin-bottom:20px;">
            <img id="popupPhoto" src="" style="width:150px; height:150px; border-radius:50%; border:3px solid #0b6623;">
        </div>
        <p><strong>Member ID:</strong> <span id="popupMemberId"></span></p>
        <p><strong>Name:</strong> <span id="popupName"></span></p>
        <p><strong>Phone:</strong> <span id="popupPhone"></span></p>
        <p><strong>Email:</strong> <span id="popupEmail"></span></p>
        <p><strong>NID:</strong> <span id="popupNid"></span></p>
        <p><strong>Blood Group:</strong> <span id="popupBlood"></span></p>
        <p><strong>Address:</strong> <span id="popupAddress"></span></p>
        <p><strong>Nominee Name:</strong> <span id="popupNomineeName"></span></p>
        <p><strong>Nominee Phone:</strong> <span id="popupNomineePhone"></span></p>
        <p><strong>Join Date:</strong> <span id="popupJoinDate"></span></p>
        <p><strong>Monthly Fee:</strong> <span id="popupFee"></span></p>
        <div style="margin-top:20px;">
            <p><strong>Signature:</strong><br><img id="popupSignature" src="" style="max-width:150px;"></p>
            <a id="popupIdCard" href="#" target="_blank" style="display:inline-block; margin-top:10px; color:blue;">Download ID Card</a>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyva2SinAyCPj76zYzUQNc05PItsQ6nKVRoZvbS15qGyRWlsmaa6WrTOKTy6xaj50tS/exec";

async function fetchMemberDashboardData(memberId) {
    try {
        const response = await fetch(`${API_URL}?action=memberProfile&memberId=${memberId}`);
        const result = await response.json();
        if (result.success) {
            window.currentMemberData = result.profile; // ডাটা গ্লোবাল সেভ
            const m = result.profile;
            document.getElementById("memberName").innerText = m.name;
            document.getElementById("memberPhoto").src = m.photo;
            // বাকি ডাটা আপডেট...
        }
    } catch (e) { console.error(e); }
}

// পপআপ ওপেন
document.getElementById("viewProfileBtn").onclick = function() {
    const m = window.currentMemberData;
    if(!m) return alert("Loading...");
    document.getElementById("popupMemberId").innerText = m.memberId;
    document.getElementById("popupName").innerText = m.name;
    document.getElementById("popupPhone").innerText = m.phone;
    document.getElementById("popupEmail").innerText = m.email;
    document.getElementById("popupNid").innerText = m.nid;
    document.getElementById("popupBlood").innerText = m.blood;
    document.getElementById("popupAddress").innerText = m.address;
    document.getElementById("popupNomineeName").innerText = m.nomineeName;
    document.getElementById("popupNomineePhone").innerText = m.nomineePhone;
    document.getElementById("popupJoinDate").innerText = m.joinDate;
    document.getElementById("popupFee").innerText = m.monthlyFee;
    document.getElementById("popupPhoto").src = m.photo;
    document.getElementById("popupSignature").src = m.signatureUrl;
    document.getElementById("popupIdCard").href = m.idCardUrl;
    document.getElementById("profilePopup").style.display = "block";
};

document.getElementById("closePopup").onclick = () => document.getElementById("profilePopup").style.display = "none";
function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
